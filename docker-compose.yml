# =============================================================================
# NITTE Merchandise Shop — Local Development Stack
# =============================================================================
#
# PURPOSE:
#   This file starts the complete application stack for LOCAL DEVELOPMENT only.
#   It is NEVER used in production. Production runs on Kubernetes via ArgoCD.
#
# WHAT IS INCLUDED:
#   Infrastructure : MongoDB, Kafka, Zookeeper, Keycloak, MinIO, Jaeger
#   Applications   : node-backend, python-service, notification-service
#   Frontends      : frontend, admin-dashboard, merchant-portal
#
# WHAT IS NOT INCLUDED (belongs to Kubernetes / Admin cluster only):
#   Jenkins, Nexus, ArgoCD, MetalLB, Istio, Prometheus, Grafana, Loki,
#   Alertmanager — these are platform concerns, not application concerns.
#
# HOW TO START:
#   1. Copy .env.example to .env in each service directory and fill in secrets.
#      At minimum set JWT_SECRET and KEYCLOAK_CLIENT_SECRET.
#   2. Run: docker compose up --build
#
# HOW TO STOP:
#   docker compose down
#
# HOW TO WIPE ALL DATA (volumes):
#   docker compose down -v
#
# SERVICE URLS (after startup):
#   Frontend         : http://localhost:5173
#   Admin Dashboard  : http://localhost:5174
#   Merchant Portal  : http://localhost:5175
#   API (node)       : http://localhost:3000
#   API Docs         : http://localhost:3000/api/docs
#   Python Service   : http://localhost:8000
#   Keycloak Admin   : http://localhost:8080  (admin / admin_password)
#   MinIO Console    : http://localhost:9001  (minioadmin / change-this-minio-secret)
#   Jaeger UI        : http://localhost:16686
#   Kafka UI         : http://localhost:8090
#   MongoDB          : localhost:27017
#
# STARTUP ORDER:
#   Infra first (MongoDB, Kafka, Keycloak, MinIO, Jaeger) → then backends → then frontends.
#   Docker Compose healthchecks enforce this ordering via depends_on conditions.
#   NOTE: Jaeger uses service_started (not service_healthy) because the official
#   all-in-one image is distroless (no shell/curl) and cannot run a healthcheck.
#
# =============================================================================

networks:
  nitte-net:
    driver: bridge

volumes:
  mongodb-data:
  zookeeper-data:
  kafka-data:
  keycloak-data:
  minio-data:

# =============================================================================
# INFRASTRUCTURE SERVICES
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MongoDB — primary database for both node-backend and python-service.
  #
  # WHY ONE INSTANCE FOR DEV?
  #   Running a full replica set or sharded cluster locally adds significant
  #   complexity. A standalone instance is correct for development.
  #   The sharding-init.js script in /database is for the production Kubernetes
  #   deployment only (runs against a mongos router, not a standalone mongod).
  #
  # DATABASE NAME: nitte_merch
  #   Both node-backend and python-service MUST use the same database name.
  #   This is enforced in their .env files and config files.
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: nitte-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-this-mongo-root-password}
      MONGO_INITDB_DATABASE: nitte_merch
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - nitte-net
    healthcheck:
      # mongosh is present in mongo:7.0. db.adminCommand('ping').ok returns 1 on success.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Zookeeper — required by Kafka for cluster coordination.
  #
  # WHY ZOOKEEPER AND NOT KRAFT (KIP-500)?
  #   The Confluent Platform images used here still default to Zookeeper mode.
  #   KRaft (Zookeeper-free) is production-ready in Kafka 3.3+. For a learning
  #   platform, Zookeeper is fine and shows you the full traditional Kafka stack.
  #   When you move to Kubernetes you will use the Strimzi operator which
  #   supports both modes.
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nitte-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - nitte-net
    healthcheck:
      # cp-zookeeper:7.6.0 is Debian-based and ships with bash.
      # bash /dev/tcp is a bash built-in — it opens a TCP connection to
      # localhost:2181. If Zookeeper is not listening, bash exits non-zero.
      # The CMD-SHELL form correctly invokes bash (not sh) via /bin/sh -c.
      # NOTE: We must use bash explicitly because /dev/tcp is bash-only.
      test:
        - CMD-SHELL
        - "bash -c '</dev/tcp/localhost/2181'"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Kafka — event streaming backbone.
  #
  # Used by:
  #   node-backend: publishes user-registration, order, product events
  #   notification-service: consumes those events to send emails/Slack/SMS
  #
  # LISTENER CONFIGURATION (important):
  #   KAFKA_ADVERTISED_LISTENERS has two entries:
  #   - INTERNAL://kafka:29092  → used by other Docker containers (by service name)
  #   - EXTERNAL://localhost:9092 → used by tools running on your laptop host
  #   Services inside Docker Compose must use kafka:29092, NOT localhost:9092.
  #   This is why KAFKA_BROKERS=kafka:29092 in the service env vars below.
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nitte-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"       # Host access for local tools / debugging
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - nitte-net
    healthcheck:
      # kafka-broker-api-versions is available in the cp-kafka image.
      # It connects to the EXTERNAL listener on localhost:9092 which is
      # accessible from inside the container (bound to 0.0.0.0).
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka UI — browser-based Kafka topic / consumer group inspector.
  #
  # Access: http://localhost:8090
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nitte-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: nitte-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - nitte-net

  # ---------------------------------------------------------------------------
  # Keycloak — Identity and Access Management (IAM).
  #
  # Used by:
  #   node-backend: validates RS256 JWTs, creates/manages users via Admin API
  #   notification-service: receives Keycloak events via POST /api/v1/events
  #   All frontends: redirect to Keycloak for login (OIDC / Authorization Code flow)
  #
  # REALM SETUP (first time only):
  #   After first startup, configure the realm manually:
  #   1. Open http://localhost:8080
  #   2. Login with admin / ${KEYCLOAK_ADMIN_PASSWORD}
  #   3. Create realm: nitte-realm
  #   4. Create client: nitte-client (confidential, direct access grants enabled)
  #   5. Copy the client secret to .env as KEYCLOAK_CLIENT_SECRET
  #   6. Export the realm: Realm Settings → Action → Partial Export
  #      Save to keycloak/nitte-realm.json for future automated import.
  #
  # AUTOMATED IMPORT (once keycloak/nitte-realm.json exists):
  #   Uncomment the volume mount and --import-realm flag below.
  #
  # DATA PERSISTENCE:
  #   Uses H2 file-based database (default for start-dev).
  #   Data persists across restarts via the keycloak-data named volume.
  #   Wiped only on: docker compose down -v
  #
  # MANAGEMENT PORT:
  #   Keycloak 17+ exposes health/metrics on port 9000 (management port),
  #   separate from the HTTP port 8080. This is why the healthcheck uses 9000.
  #
  # Access: http://localhost:8080  (admin / ${KEYCLOAK_ADMIN_PASSWORD:-admin_password})
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: nitte-keycloak
    restart: unless-stopped
    # start-dev: enables dev mode (HTTP, relaxed hostname checks, faster startup).
    # Remove --import-realm if keycloak/nitte-realm.json does not exist yet.
    # Add it back once you have exported a realm JSON.
    command: >
      start-dev
      --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_password}

      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"

      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

      # Management port for health/metrics (default: 9000).
      # NOT published to host — healthcheck uses curl inside container only.
      KC_HTTP_MANAGEMENT_PORT: 9000

      KC_LOG_LEVEL: INFO

      # KC_DB intentionally omitted — start-dev defaults to H2 file storage
      # at /opt/keycloak/data/h2, persisted by the named volume below.
      # Do NOT set KC_DB=dev-mem: that discards all data on every restart.

    ports:
      - "8080:8080"
      # Port 9000 (management) deliberately NOT published — no host collision
      # with MinIO (which owns host port 9000). Healthcheck hits it from inside.
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/nitte-realm.json:/opt/keycloak/data/import/nitte-realm.json:ro
      - ./keycloak/themes/nitte:/opt/keycloak/themes/nitte:ro
    networks:
      - nitte-net
    healthcheck:
      # curl is confirmed absent in this environment (ExitCode 1: curl: command not found).
      # Fix: pure bash /dev/tcp built-in — zero external tool dependency.
      # Probes port 8080 (main HTTP port). TCP connection succeeds the moment
      # Keycloak's JVM is listening, which is the correct liveness signal.
      # TIMING: log shows 62s cold start. start_period: 90s + retries: 15 x 15s
      # gives 315s total tolerance before Docker marks the container failed.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for user avatars and product images.
  #
  # Used by node-backend for:
  #   - User avatar uploads    → nitte-users bucket
  #   - Product image uploads  → nitte-products bucket
  #
  # Two ports:
  #   9000: S3 API (used by node-backend S3 SDK)
  #   9001: MinIO Web Console (for you to browse buckets visually)
  #
  # HEALTHCHECK NOTE:
  #   The MinIO server image (minio/minio) is based on UBI-micro which does NOT
  #   ship curl or wget. The correct tool is curl but it's absent in UBI-micro.
  #   Instead we use wget which IS available in UBI-micro via the busybox layer,
  #   OR we rely on the fact that MinIO since RELEASE.2023-10 ships curl.
  #
  #   For RELEASE.2024-03-26 specifically, the image uses a distroless base
  #   that lacks curl. The fix is to use the mc (MinIO Client) binary approach
  #   via a shell TCP connection to port 9000, which works because the MinIO
  #   image ships with /bin/sh (ash/busybox) and /dev/tcp is available via netcat.
  #
  #   ACTUAL FIX: Use CMD array form with the minio binary's built-in liveness
  #   probe via a direct HTTP check using sh + /dev/tcp workaround.
  #   Since /dev/tcp is bash-only and this image has only /bin/sh (busybox ash),
  #   we use 'wget -q --spider' which IS present in the busybox-based MinIO image.
  #
  # Access: http://localhost:9001  (minioadmin / change-this-minio-secret)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-03-26T22-10-45Z
    container_name: nitte-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-this-minio-secret}
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    volumes:
      - minio-data:/data
    networks:
      - nitte-net
    healthcheck:
      # MinIO RELEASE.2024-03-26 is UBI-micro based.
      # Confirmed absent: curl, wget, nc, grep — none are available.
      # Only bash and the minio binary are present.
      #
      # Solution: pure bash /dev/tcp built-in.
      # 'exec 3<>/dev/tcp/localhost/9000' opens a TCP connection to MinIO's
      # S3 API port using bash's built-in virtual filesystem — zero external
      # tools required. If MinIO is listening, the connection succeeds (exit 0).
      # If MinIO is not yet up, the connection is refused (exit non-zero).
      # This is a TCP liveness check, not an HTTP health check, but it is
      # 100% reliable and requires nothing beyond bash itself.
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/localhost/9000'"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # MinIO bucket initializer — creates required buckets on first startup.
  # Uses the mc (MinIO Client) CLI. Runs once and exits.
  minio-init:
    image: minio/mc:RELEASE.2024-03-20T21-07-29Z
    container_name: nitte-minio-init
    restart: no    # Run once only — quotes removed; bare 'no' is correct YAML
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - nitte-net
    entrypoint: |
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin '${MINIO_ROOT_PASSWORD:-change-this-minio-secret}'
        mc mb --ignore-existing local/nitte-users
        mc mb --ignore-existing local/nitte-products
        mc anonymous set download local/nitte-products
        echo 'MinIO buckets initialized.'
      "

  # ---------------------------------------------------------------------------
  # Jaeger — distributed tracing backend.
  #
  # Both node-backend (via OpenTelemetry OTLP HTTP on port 4318) and
  # python-service (via Jaeger Thrift UDP on port 6831) send traces here.
  #
  # HEALTHCHECK: INTENTIONALLY REMOVED.
  #   jaegertracing/all-in-one:1.57 is built on a scratch/distroless base.
  #   There is NO shell (/bin/sh), NO curl, and NO wget inside the image.
  #   CMD-SHELL will immediately fail with "exec: no such file or directory",
  #   causing Docker to mark the container unhealthy even though it is running
  #   perfectly. This is what you observed.
  #
  #   Solution: Remove the healthcheck. Jaeger starts in under 5 seconds and
  #   has no prerequisites. Application services use service_started (not
  #   service_healthy) for their Jaeger dependency — this means they start
  #   after Jaeger's container is created, not after a health probe passes.
  #   Tracing is non-critical; if Jaeger hasn't fully opened its ports yet,
  #   the OTLP/Thrift exporters will buffer and retry automatically.
  #
  # Access: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: nitte-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "6831:6831/udp"   # Jaeger Thrift UDP (python-service)
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP (node-backend)
      - "16686:16686"     # Jaeger Query UI
    networks:
      - nitte-net
    # NO healthcheck — image is distroless (scratch base), no shell or tools available.
    # Dependents use condition: service_started instead of service_healthy.

# =============================================================================
# APPLICATION SERVICES
# =============================================================================

  # ---------------------------------------------------------------------------
  # node-backend — Express.js API Gateway (port 3000)
  #
  # This is the primary backend. All frontend applications talk to this service.
  # It handles authentication, business logic, Kafka events, MinIO uploads,
  # and proxies catalog/order reads to python-service.
  #
  # CRITICAL: JWT_SECRET and KEYCLOAK_CLIENT_SECRET are REQUIRED.
  # The app will refuse to start if either is missing (enforced in config/index.js).
  # ---------------------------------------------------------------------------
  node-backend:
    build:
      context: ./services/node-backend
      dockerfile: Dockerfile
    container_name: nitte-node-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        # service_started (not service_healthy) because jaeger has no healthcheck
        # (distroless image — no shell available for health probes).
        # Jaeger starts in <5s with no prerequisites; service_started is sufficient.
        condition: service_started
    environment:
      NODE_ENV: development

      MONGODB_URL: mongodb://admin:${MONGODB_ROOT_PASSWORD:-change-this-mongo-root-password}@mongodb:27017/nitte_merch?authSource=admin

      # REQUIRED — must be set in your .env file. Will error at startup if missing.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env — see .env.example}
      JWT_EXPIRY: 7d

      PYTHON_SERVICE_URL: http://python-service:8000
      KAFKA_BROKERS: kafka:29092

      # REQUIRED — must be set in .env after Keycloak client is configured.
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: nitte-realm
      KEYCLOAK_CLIENT_ID: nitte-client
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET must be set in .env}

      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-this-minio-secret}
      S3_BUCKET_NAME: nitte-users
      S3_PRODUCTS_BUCKET: nitte-products

      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_HOST: jaeger

      # All three frontends are allowed — browser origins, not Docker service names
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175

      LOG_LEVEL: info
      REQUEST_TIMEOUT: 30000
    ports:
      - "3000:3000"
    networks:
      - nitte-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # python-service — FastAPI catalog and orders microservice (port 8000)
  #
  # Handles product catalog reads and order persistence via Motor (async MongoDB).
  # node-backend proxies catalog requests here via pythonServiceClient.js.
  #
  # DATABASE NAME must match node-backend (nitte_merch).
  # ---------------------------------------------------------------------------
  python-service:
    build:
      context: ./services/python-service
      dockerfile: Dockerfile
    container_name: nitte-python-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      jaeger:
        # service_started for the same reason as node-backend above:
        # jaeger is distroless with no healthcheck available.
        condition: service_started
    environment:
      ENVIRONMENT: development
      PORT: 8000
      HOST: 0.0.0.0

      MONGODB_URL: mongodb://admin:${MONGODB_ROOT_PASSWORD:-change-this-mongo-root-password}@mongodb:27017
      DATABASE_NAME: nitte_merch

      API_GATEWAY_URL: http://node-backend:3000

      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831

      LOG_LEVEL: info
    ports:
      - "8000:8000"
    networks:
      - nitte-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # notification-service — Kafka consumer for notifications (port 9100)
  #
  # Consumes events from Kafka (user approved/rejected, orders, Keycloak events)
  # and dispatches notifications via email, Slack, or SMS.
  #
  # In development, EMAIL_PROVIDER=console means notifications are logged to
  # stdout instead of actually sending emails — safe for local testing.
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: nitte-notification-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: development

      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: notification-service
      KAFKA_CONSUMER_GROUP: notification-service

      EMAIL_ENABLED: "true"
      EMAIL_PROVIDER: console      # Logs to stdout in dev — no real emails sent

      SLACK_ENABLED: "false"
      SLACK_WEBHOOK_URL: ""

      TICKET_ENABLED: "true"
      TICKET_PROVIDER: console

      KEYCLOAK_ADMIN_EMAILS: internal-admin@nitte.ac.in
      ADMIN_NOTIFICATION_EMAILS: internal-admin@nitte.ac.in

      API_BASE_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173

      LOG_LEVEL: info
      METRICS_PORT: 9100
    ports:
      - "9100:9100"
    networks:
      - nitte-net

# =============================================================================
# FRONTEND SERVICES
# =============================================================================
#
# HEALTHCHECK NOTE FOR ALL FRONTENDS:
#   Healthchecks have been removed from all three frontend services.
#   Reason: These services are terminal — nothing depends on them via
#   service_healthy. The standard nginx:alpine base image does NOT ship curl,
#   so curl-based healthchecks immediately fail, marking the containers
#   unhealthy even though nginx is serving traffic correctly.
#   If your Dockerfiles install curl explicitly, you may re-add healthchecks.
#
# VITE BUILD-TIME ENV VARS:
#   VITE_API_URL is resolved at BUILD TIME by Vite (not at runtime by nginx).
#   The value must be the address the BROWSER uses — always localhost:3000,
#   never the Docker service name 'node-backend'. This is correct behavior.

  # ---------------------------------------------------------------------------
  # frontend — React + Vite SPA for end users (port 5173)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: nitte-frontend
    restart: unless-stopped
    depends_on:
      node-backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - nitte-net
    # No healthcheck — nginx:alpine has no curl; nothing depends on this service.

  # ---------------------------------------------------------------------------
  # admin-dashboard — React + Vite SPA for platform admins (port 5174)
  # ---------------------------------------------------------------------------
  admin-dashboard:
    build:
      context: ./services/admin-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: nitte-admin-dashboard
    restart: unless-stopped
    depends_on:
      node-backend:
        condition: service_healthy
    ports:
      - "5174:5174"
    networks:
      - nitte-net
    # No healthcheck — nginx:alpine has no curl; nothing depends on this service.

  # ---------------------------------------------------------------------------
  # merchant-portal — React + Vite SPA for merchants (port 5175)
  # ---------------------------------------------------------------------------
  merchant-portal:
    build:
      context: ./services/merchant-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: nitte-merchant-portal
    restart: unless-stopped
    depends_on:
      node-backend:
        condition: service_healthy
    ports:
      - "5175:5175"
    networks:
